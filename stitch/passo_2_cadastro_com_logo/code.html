<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;701;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-container": "#6e2c00",
              "secondary": "#006c49",
              "on-secondary-fixed-variant": "#005236",
              "on-secondary-fixed": "#002113",
              "surface-container-low": "#f3f4f5",
              "surface-bright": "#f8f9fa",
              "error": "#ba1a1a",
              "surface-container": "#edeeef",
              "primary-fixed": "#dce1ff",
              "primary": "#00236f",
              "on-tertiary-container": "#f39461",
              "on-tertiary-fixed": "#341100",
              "on-primary-fixed": "#00164e",
              "secondary-fixed": "#6ffbbe",
              "on-tertiary": "#ffffff",
              "on-secondary-container": "#00714d",
              "on-primary-fixed-variant": "#264191",
              "surface-variant": "#e1e3e4",
              "surface": "#f8f9fa",
              "primary-container": "#1e3a8a",
              "inverse-on-surface": "#f0f1f2",
              "surface-container-highest": "#e1e3e4",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#ffdbcb",
              "on-secondary": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "background": "#f8f9fa",
              "surface-dim": "#d9dadb",
              "on-primary-container": "#90a8ff",
              "tertiary": "#4b1c00",
              "primary-fixed-dim": "#b6c4ff",
              "inverse-surface": "#2e3132",
              "outline-variant": "#c5c5d3",
              "on-surface-variant": "#444651",
              "tertiary-fixed-dim": "#ffb691",
              "secondary-container": "#6cf8bb",
              "secondary-fixed-dim": "#4edea3",
              "on-surface": "#191c1d",
              "outline": "#757682",
              "on-error-container": "#93000a",
              "inverse-primary": "#b6c4ff",
              "surface-container-lowest": "#ffffff",
              "on-tertiary-fixed-variant": "#773205",
              "surface-tint": "#4059aa",
              "on-background": "#191c1d"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #F8F9FA;
        }
        .architectural-shadow {
            box-shadow: 0 20px 40px rgba(25, 28, 29, 0.04);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Suppressing full nav for focused onboarding) -->
<header class="flex justify-center items-center w-full py-8 px-8">
<div class="flex items-center gap-2"><img alt="Finanflex Logo" class="h-12 w-auto" src="https://lh3.googleusercontent.com/aida/ADBb0uh3UGypfevc5k64Cu0EhZT2Mfw0r0pDbkwrY55vQlI-3b03WHKThy_B2cuRQEzqHR0ts4MKi7GM123cZ7jQIsqOZSoYwhsuMzUxbalkOPE_xkcibJyzwd3Q0KlGeStUjwZ8NQ3RY9Sb6HrwHFe78dUNQGn3vquv00_ggAoRNdOsj87XRPvWHvXN1jDLIzDF1OktOLhaKnT9hc6ntMUgFPOKo9u1gDY3lcJUuhpp5jSnBNN7URPkwudwicI-19EgHDkL5S1zOB_ZO0g"/></div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pb-20">
<div class="w-full max-w-[600px] animate-fade-in">
<!-- Registration Card -->
<div class="bg-surface-container-lowest rounded-xl architectural-shadow p-8 md:p-12 relative overflow-hidden">
<!-- Subtle Background Glow (The Financial Glow) -->
<div class="absolute -top-24 -right-24 w-64 h-64 bg-secondary-container opacity-10 rounded-full blur-3xl"></div>
<div class="relative z-10">
<!-- Progress Bar Component -->
<div class="flex items-center justify-between mb-10">
<div class="w-full h-1.5 bg-surface-container rounded-full flex overflow-hidden">
<div class="w-1/2 h-full bg-surface-container-highest"></div>
<div class="w-1/2 h-full bg-secondary"></div>
</div>
<span class="ml-4 font-label text-[10px] uppercase tracking-[0.05em] font-bold text-outline">Etapa 2 de 2</span>
</div>
<!-- Header Section -->
<div class="mb-10 text-center md:text-left">
<h2 class="font-headline text-2xl md:text-3xl font-extrabold text-primary tracking-tight mb-3">Quase lá! Falta pouco.</h2>
<p class="font-body text-on-surface-variant leading-relaxed opacity-80">Crie sua conta rapidinho para ver as opções de parcelamento no Pix.</p>
</div>
<!-- Registration Form -->
<form class="space-y-6">
<div class="space-y-1.5">
<label class="block font-label text-[10px] uppercase tracking-[0.1em] font-bold text-primary ml-1">Nome Completo</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all outline-none" placeholder="Como quer ser chamado?" type="text"/>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="space-y-1.5">
<label class="block font-label text-[10px] uppercase tracking-[0.1em] font-bold text-primary ml-1">CPF</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all outline-none" placeholder="000.000.000-00" type="text"/>
</div>
<div class="space-y-1.5">
<label class="block font-label text-[10px] uppercase tracking-[0.1em] font-bold text-primary ml-1">WhatsApp</label>
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all outline-none" placeholder="(00) 00000-0000" type="tel"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block font-label text-[10px] uppercase tracking-[0.1em] font-bold text-primary ml-1">Crie uma Senha</label>
<div class="relative">
<input class="w-full bg-surface-container-high border-none rounded-lg px-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all outline-none" placeholder="Mínimo 6 caracteres" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<div class="pt-6">
<button class="w-full bg-secondary text-on-secondary font-headline font-bold py-5 rounded-full flex items-center justify-center gap-3 hover:bg-on-secondary-fixed-variant transition-all transform active:scale-[0.98] shadow-lg shadow-secondary/10" type="submit">
                                Ver Opções de Parcelamento
                                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Security Note -->
<div class="mt-8 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-outline text-sm" data-icon="lock">lock</span>
<p class="font-body text-[11px] text-outline font-medium">Seus dados são criptografados e protegidos.</p>
</div>
</div>
</div>
<!-- Contextual Social Proof / Info -->
<div class="mt-8 text-center">
<p class="font-label text-[10px] uppercase tracking-[0.05em] text-outline">Precisa de ajuda?</p>
<a class="font-body text-xs font-semibold text-primary-container hover:underline mt-1 inline-block" href="#">Falar com um consultor Finanflex</a>
</div>
</div>
</main>
<!-- Footer Component -->
<footer class="flex flex-col items-center gap-2 pb-8 w-full mt-auto">
<p class="font-label text-[10px] uppercase tracking-[0.05em] font-medium text-gray-400">© 2024 Finanflex. Secured Editorial Ledger.</p>
<div class="flex gap-6">
<a class="font-label text-[10px] uppercase tracking-[0.05em] font-medium text-gray-400 hover:text-[#1E3A8A] transition-colors" href="#">Privacy</a>
<a class="font-label text-[10px] uppercase tracking-[0.05em] font-medium text-gray-400 hover:text-[#1E3A8A] transition-colors" href="#">Terms</a>
<a class="font-label text-[10px] uppercase tracking-[0.05em] font-medium text-gray-400 hover:text-[#1E3A8A] transition-colors" href="#">Help</a>
</div>
</footer>
</body></html>
