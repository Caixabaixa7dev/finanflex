<head>
  <meta charset="utf-8" />

            "surface-container-lowest": "#ffffff",
            "on-primary-fixed": "#00164e",
            "on-primary-fixed-variant": "#264191",
            "tertiary-fixed": "#ffdbcb",
            "surface-container-highest": "#e1e3e4",
            "on-secondary-fixed-variant": "#005236",
            "surface-container-low": "#f3f4f5",
            "tertiary": "#4b1c00",
            "error-container": "#ffdad6",
            "tertiary-fixed-dim": "#ffb691",
            "surface-bright": "#f8f9fa",
            "secondary-fixed-dim": "#4edea3",
            "on-tertiary": "#ffffff",
            "surface-tint": "#4059aa",
            "surface-container": "#edeeef",
            "outline": "#757682",
            "on-surface": "#191c1d",
            "on-tertiary-fixed-variant": "#773205",
            "secondary-container": "#6cf8bb",
            "on-background": "#191c1d",
            "on-secondary-container": "#00714d",
            "on-secondary-fixed": "#002113",
            "inverse-on-surface": "#f0f1f2",
            "on-primary-container": "#90a8ff",
            "on-primary": "#ffffff",
            "secondary": "#006c49",
            "primary-fixed-dim": "#b6c4ff",
            "on-error": "#ffffff",
            "on-tertiary-fixed": "#341100",
            "secondary-fixed": "#6ffbbe",

            "surface-variant": "#e1e3e4",
            "surface-dim": "#d9dadb",
            "background": "#f8f9fa",
            "on-tertiary-container": "#f39461",
            "surface-container-high": "#e7e8e9",
            "surface": "#f8f9fa",
            "on-error-container": "#93000a",
            "primary-container": "#1e3a8a",
            "on-secondary": "#ffffff",
            "error": "#ba1a1a",

            "primary-fixed": "#dce1ff"

  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    body {
      background-color: #F8F9FA;
      font-family: 'Manrope', sans-serif;
    }

  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body class="flex flex-col min-h-screen items-center justify-center p-6 antialiased text-on-surface">
  <div class="w-full max-w-md flex flex-col items-center">
    <!-- Brand Identity Container -->
    <div class="mb-10 text-center"><img alt="Finanflex Logo" class="h-24 mx-auto object-contain"
        src="/images/logo.png" /></div>
    <!-- Authentication Card -->
    <div
      class="w-full bg-surface-container-lowest rounded-3xl p-8 md:p-12 shadow-[0_20px_40px_rgba(25,28,29,0.04)] border border-outline-variant/10">
      <header class="mb-10">
        <h1 class="font-headline text-2xl font-bold tracking-tight text-primary-container mb-2">Acesse sua conta</h1>
        <p class="font-body text-on-surface-variant leading-relaxed text-sm">Acompanhe seus parcelamentos e faturas com
          a segurança de um banco digital completo.</p>
      </header>
      <form id="loginForm" onsubmit="handleLogin(event)" class="space-y-6">
        <!-- CPF Input Group -->
        <div class="space-y-2">
          <label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant block ml-1"
            for="cpf">CPF</label>
          <div class="relative">
            <input
              class="w-full h-14 bg-surface-container-high border-none rounded-xl px-4 font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50"
              id="cpf" placeholder="000.000.000-00" type="text" />
          </div>
        </div>
        <!-- Password Input Group -->
        <div class="space-y-2">
          <div class="flex justify-between items-center px-1">
            <label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant block"
              for="password">Senha</label>
            <a class="text-xs font-bold text-primary-container hover:text-secondary transition-colors" href="#">Esqueci
              minha senha</a>
          </div>
          <div class="relative">
            <input
              class="w-full h-14 bg-surface-container-high border-none rounded-xl px-4 font-body focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all placeholder:text-outline/50"
              id="password" placeholder="••••••••" type="password" />
            <button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
              <span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
            </button>
          </div>
        </div>
        <!-- Primary Action -->
        <button
          class="w-full h-14 bg-primary-container text-on-primary font-bold rounded-full shadow-lg hover:bg-primary transition-all active:scale-95 flex items-center justify-center gap-2 group"
          type="submit">
          <span>Entrar</span>
          <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform"
            data-icon="arrow_forward">arrow_forward</span>
        </button>
      </form>
    </div>
    <!-- Footer Call to Action -->
    <div class="mt-8 text-center px-4">
      <p class="font-body text-on-surface-variant text-sm">
        Ainda não tem conta?
        <a class="text-secondary font-bold hover:underline ml-1" href="/captura.html">Parcele um boleto agora</a>
      </p>
    </div>
    <!-- Visual Anchor / Background Element -->
    <div
      class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 opacity-20 blur-3xl pointer-events-none bg-gradient-to-bl from-primary-container to-transparent">
    </div>
    <div
      class="fixed bottom-0 left-0 -z-10 w-1/3 h-1/2 opacity-10 blur-3xl pointer-events-none bg-gradient-to-tr from-secondary-container to-transparent">
    </div>
  </div>
  <!-- Security Badge -->
  <div class="mt-auto py-8 flex items-center gap-4 opacity-50 grayscale hover:grayscale-0 transition-all">
    <div class="flex items-center gap-1">
      <span class="material-symbols-outlined text-sm" data-icon="lock"
        style="font-variation-settings: 'FILL' 1;">lock</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-bold">Ambiente Seguro</span>
    </div>
    <div class="w-px h-3 bg-outline-variant"></div>
    <div class="flex items-center gap-1">
      <span class="material-symbols-outlined text-sm" data-icon="verified_user"
        style="font-variation-settings: 'FILL' 1;">verified_user</span>
      <span class="font-label text-[10px] uppercase tracking-widest font-bold">Dados Criptografados</span>
    </div>
  </div>
  <script>
    async function handleLogin(e) {
      e.preventDefault();

      const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
      const senha = document.getElementById('password').value;
      const btn = e.target.querySelector('button[type="submit"]');

      if (!cpf || !senha) return alert('Preecha CPF e Senha');

      btn.innerHTML = 'Aguarde...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ cpf, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          alert(data.error || 'Erro ao realizar login.');
          btn.innerHTML = 'Acessar Conta';
          btn.disabled = false;
          return;
        }

        // Save JWT in browser
        localStorage.setItem('finanflex_token', data.token);
        window.location.href = '/pagamentos.html';

      } catch (err) {
        console.error(err);
        alert('Falha interna de conexão.');
        btn.innerHTML = 'Acessar Conta';
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
