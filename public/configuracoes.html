<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

<body class="bg-surface text-on-surface min-h-screen pb-32">

<script>
    if (!localStorage.getItem('finanflex_token')) {
        window.location.href = '/login.html';
    }
</script>

<header class="fixed top-0 w-full z-50 bg-[#F8F9FA] dark:bg-slate-950/80 backdrop-blur-xl">
    <div class="flex justify-between items-center px-6 py-4 w-full">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden border border-outline-variant/15">
                <img src="https://img.freepik.com/vetores-gratis/circulo-azul-com-usuario-branco_78370-4707.jpg?semt=ais_hybrid&amp;w=740&amp;q=80" class="w-full h-full object-cover">
            </div>
            <img src="/images/logo.png" class="h-8 w-auto">
        </div>
        <button class="w-10 h-10 flex items-center justify-center text-slate-500"><span class="material-symbols-outlined">notifications</span></button>
    </div>
</header>

<main class="pt-24 px-6 max-w-2xl mx-auto space-y-12">
    <section class="mb-8">
        <h2 class="text-3xl font-extrabold tracking-tight text-primary-container leading-none">Ajustes</h2>
        <p class="text-on-surface-variant mt-4 leading-relaxed font-light">Gerencie suas preferências de segurança e notificações.</p>
    </section>

    <div class="space-y-6">
        <h3 class="text-sm font-bold tracking-tight text-primary uppercase opacity-60">Preferências do App</h3>
        <div class="bg-surface-container-lowest rounded-3xl p-6 space-y-6 shadow-sm">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-primary">notifications_active</span>
                    <p class="font-bold">Notificações</p>
                </div>
                <input type="checkbox" checked class="rounded text-secondary focus:ring-secondary">
            </div>
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <span class="material-symbols-outlined text-primary">dark_mode</span>
                    <p class="font-bold">Modo Escuro</p>
                </div>
                <input type="checkbox" class="rounded text-secondary focus:ring-secondary">
            </div>
        </div>
    </div>

    <div class="pt-8">
        <button onclick="logout()" class="w-full py-5 rounded-2xl border border-error/20 text-error font-bold flex items-center justify-center gap-3 hover:bg-error/5 transition-all">
            <span class="material-symbols-outlined">logout</span> Sair da Conta
        </button>
    </div>
</main>

<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#F8F9FA]/80 backdrop-blur-xl border-t border-outline-variant/15 z-50">
    <a href="/pagamentos.html" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">account_balance_wallet</span><span class="text-[11px] mt-1">Resumo</span></a>
    <a href="/pagamentos.html" class="flex flex-col items-center text-slate-400"><span class="material-symbols-outlined">receipt_long</span><span class="text-[11px] mt-1">Pagamentos</span></a>
    <a href="/configuracoes.html" class="flex flex-col items-center text-[#10B981]"><span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span><span class="text-[11px] mt-1">Ajustes</span></a>
</nav>

<script>
    function logout() {
        localStorage.removeItem('finanflex_token');
        window.location.href = '/index.html';
    }
</script>
</body></html>
